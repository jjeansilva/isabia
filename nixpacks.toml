# Nixpacks configuration for Next.js
# Force Node 22 and fallback install command if npm ci fails

providers = ["node"]

NODE_VERSION = "22"

[phases.setup]
cmds = [
  "corepack enable",
  "corepack prepare npm@10.8.2 --activate"
]

[phases.install]
cmd = "node -v && npm -v && npm install"

[phases.build]
cmd = "npm run build"

[start]
cmd = "npm run start"